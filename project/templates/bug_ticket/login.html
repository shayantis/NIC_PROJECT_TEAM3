{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIC Bug Tracker - Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f3f4f6; margin: 0; }
        .login-box { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        .login-box h2 { margin: 0 0 8px; font-size: 22px; color: #1e293b; }
        .login-box p { margin: 0 0 24px; color: #64748b; font-size: 14px; }
        .login-box label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 500; color: #374151; }
        .login-box input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
        .login-box input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
        .login-box button { width: 100%; padding: 11px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 500; }
        .login-box button:hover { background: #4f46e5; }
        .error-msg { background: #fee2e2; color: #991b1b; padding: 10px 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; border-left: 3px solid #dc2626; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>NIC Bug Tracker</h2>
        <p>Sign in to your account</p>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
